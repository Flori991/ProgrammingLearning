name: Publish AirVPN API

on:
  push:
    branches:
      - main
    paths:
      - 'Go/air-vpn-api/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: Go/air-vpn-api
          push: true
          tags: ghcr.io/flori991/airvpn-api:latest
